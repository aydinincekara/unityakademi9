<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Sayfa Bulunamadı | UnityAkademi</title>
  <meta name="description" content="Aradığın sayfa burada değil. Ana sayfaya dön veya sözlük/arama'yı kullan.">
  <meta name="theme-color" content="#fa7d19">
  <meta name="robots" content="noindex,follow">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="css/variables.css?v=11">
  <link rel="stylesheet" href="css/reset.css?v=11">
  <link rel="stylesheet" href="css/extras.css?v=11">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, rgba(250, 125, 25, 0.15), transparent 60%),
                  var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-display);
      padding: 24px;
    }
    .err-wrap {
      text-align: center;
      max-width: 560px;
    }
    .err-code {
      font-size: 144px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #fa7d19 0%, #50e3c2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 8px;
      letter-spacing: -0.04em;
    }
    .err-icon {
      font-size: 56px;
      color: var(--primary);
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .err-title {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .err-msg {
      color: var(--text-secondary);
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 32px;
    }
    .err-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .err-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .err-btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 8px 24px var(--primary-glow);
    }
    .err-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px var(--primary-glow);
    }
    .err-btn-secondary {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      color: var(--text-primary);
    }
    .err-btn-secondary:hover {
      border-color: var(--primary);
    }
    .err-links {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border-default);
      font-size: 14px;
      color: var(--text-tertiary);
    }
    .err-links a {
      color: var(--accent);
      margin: 0 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-icon"><i class="ti ti-cube-off"></i></div>
    <div class="err-code">404</div>
    <h1 class="err-title">Bu GameObject sahnede yok</h1>
    <p class="err-msg">
      Aradığın sayfa bulunamadı. Belki bir bölüm yer değiştirdi, belki URL'de bir typo var. Ana sayfaya dönüp tekrar başlayabilirsin.
    </p>
    <div class="err-actions">
      <a href="index.html" class="err-btn err-btn-primary">
        <i class="ti ti-home"></i> Ana Sayfa
      </a>
      <a href="pages/arama.html" class="err-btn err-btn-secondary">
        <i class="ti ti-search"></i> Arama
      </a>
    </div>
    <div class="err-links">
      Hızlı bağlantılar:
      <a href="pages/01-kurulum.html">Bölüm 01</a> ·
      <a href="pages/04-csharp-temelleri.html">C# Temelleri</a> ·
      <a href="pages/sozluk.html">Sözlük</a> ·
      <a href="pages/cheatsheet.html">Cheat Sheet</a> ·
      <a href="pages/sss.html">SSS</a>
    </div>
  </div>
  <script src="js/main.js?v=11"></script>
</body>
</html>

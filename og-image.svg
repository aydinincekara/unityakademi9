<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080d"/>
      <stop offset="50%" stop-color="#2d1a08"/>
      <stop offset="100%" stop-color="#08080d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fa7d19"/>
      <stop offset="100%" stop-color="#50e3c2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fa7d19" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fa7d19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#fa7d19" stroke-width="1" fill="none">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Glow -->
  <ellipse cx="180" cy="315" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Unity logo (stylized cube/octahedron) -->
  <g transform="translate(120, 235)">
    <path d="M80 30 L130 5 L155 50 L130 95 L80 70 Z M80 30 L25 50 L25 110 L80 130 L80 70 Z M80 130 L130 105 L155 110 L130 155 L80 130 Z" fill="#fa7d19"/>
    <path d="M80 30 L130 5 L155 50 L130 95 L80 70 Z" fill="#ff9d4f" opacity="0.8"/>
    <path d="M80 130 L130 105 L155 110 L130 155 L80 130 Z" fill="#d65f00"/>
  </g>

  <!-- Title -->
  <text x="340" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="800" fill="url(#brand)" letter-spacing="-3">UnityAkademi</text>

  <!-- Subtitle -->
  <text x="340" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#b0b0c0" letter-spacing="-0.5">Türkçe Unity 2022.3 LTS &amp; Unity 6 eğitim platformu</text>

  <!-- Stats row -->
  <g transform="translate(340, 410)">
    <rect x="0" y="0" width="170" height="80" rx="14" fill="#16161f" stroke="#fa7d19" stroke-width="1" opacity="0.9"/>
    <text x="85" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#fa7d19">27</text>
    <text x="85" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b0b0c0" letter-spacing="1">BÖLÜM</text>

    <rect x="185" y="0" width="170" height="80" rx="14" fill="#16161f" stroke="#50e3c2" stroke-width="1" opacity="0.9"/>
    <text x="270" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#50e3c2">81</text>
    <text x="270" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b0b0c0" letter-spacing="1">PROJE</text>

    <rect x="370" y="0" width="170" height="80" rx="14" fill="#16161f" stroke="#fa7d19" stroke-width="1" opacity="0.9"/>
    <text x="455" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#fa7d19">135</text>
    <text x="455" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b0b0c0" letter-spacing="1">QUIZ</text>

    <rect x="555" y="0" width="170" height="80" rx="14" fill="#16161f" stroke="#50e3c2" stroke-width="1" opacity="0.9"/>
    <text x="640" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#50e3c2">2</text>
    <text x="640" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b0b0c0" letter-spacing="1">SÜRÜM</text>
  </g>

  <!-- Bottom ribbon -->
  <rect x="0" y="570" width="1200" height="60" fill="#fa7d19" opacity="0.1"/>
  <text x="600" y="608" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#fa7d19" letter-spacing="3">C# · MONOBEHAVIOUR · URP · CINEMACHINE · NEW INPUT · UNITY 6</text>
</svg>
